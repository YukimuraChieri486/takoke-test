<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Takoke指数测试</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-28K17ZF29T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-28K17ZF29T');

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --text2: #aaa;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* ==================== SCREENS ==================== */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeSlideIn 0.4s ease; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==================== START SCREEN ==================== */
  .start-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .start-card .icon { font-size: 64px; margin-bottom: 16px; }
  .start-card h1 {
    font-size: clamp(24px, 6vw, 32px);
    margin-bottom: 8px;
    background: linear-gradient(135deg, #e94560, #f77f00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .start-card .subtitle { color: var(--text2); font-size: 15px; margin-bottom: 28px; line-height: 1.6; }
  .start-card .tag {
    display: inline-block;
    background: var(--accent2);
    color: #fcbf49;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 18px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(233,69,96,0.35);
  }
  .btn:active { transform: scale(0.96); box-shadow: 0 2px 12px rgba(233,69,96,0.25); }

  /* ==================== QUIZ SCREEN ==================== */
  .quiz-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px 24px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .progress-wrap { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text2); }
  .progress-bar {
    height: 6px;
    background: var(--accent2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.35s ease;
  }

  .q-number {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .q-text {
    font-size: clamp(17px, 4vw, 20px);
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 48px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    line-height: 1.5;
  }
  .opt-btn:active { transform: scale(0.985); }
  .opt-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .opt-btn .opt-label {
    display: inline-block;
    background: var(--accent2);
    color: var(--accent);
    font-weight: 700;
    width: 28px; height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 50%;
    margin-right: 12px;
    font-size: 14px;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .opt-btn .opt-label-inner { vertical-align: middle; display: inline; }

  /* ==================== RESULT SCREEN ==================== */
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .result-emoji { font-size: 72px; margin-bottom: 12px; }
  .result-score {
    font-size: clamp(48px, 12vw, 64px);
    font-weight: 900;
    background: linear-gradient(135deg, #e94560, #f77f00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .result-percent { font-size: 24px; color: var(--text2); }
  .result-title { font-size: 22px; font-weight: 700; margin: 12px 0 8px; }
  .result-desc { color: var(--text2); font-size: 15px; line-height: 1.7; margin-bottom: 28px; }

  .share-hint {
    font-size: 13px;
    color: var(--text2);
    margin-top: 16px;
    opacity: 0.7;
  }

  /* ==================== CLICK EFFECT ==================== */
  .click-fx {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    animation: clickPop 0.7s ease-out forwards;
    width: 60px;
    height: 60px;
    object-fit: contain;
  }
  @keyframes clickPop {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(10deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4) rotate(-5deg); }
  }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 400px) {
    .start-card { padding: 32px 18px; }
    .quiz-card { padding: 20px 16px 18px; }
    .result-card { padding: 28px 18px; }
    .opt-btn { padding: 14px 14px; font-size: 15px; }
    .btn { padding: 12px 36px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ====== START ====== -->
  <div class="screen active" id="screen-start">
    <div class="start-card">
      <div class="icon">🔰</div>
      <h1>Takoke指数测试</h1>
      <p class="subtitle">你是不是跟他们一伙的。。。</p>
      <div class="tag">⚠️ 仅供娱乐</div>
      <br>
      <button class="btn" onclick="startQuiz()">开 始 测 试</button>
    </div>
  </div>

  <!-- ====== QUIZ ====== -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-card">
      <div class="progress-wrap">
        <div class="progress-info">
          <span id="prog-label">第 1 / 17 题</span>
          <span id="prog-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>
  </div>

  <!-- ====== RESULT ====== -->
  <div class="screen" id="screen-result">
    <div class="result-card">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-score" id="res-score"></div>
      <div class="result-percent">高建指数</div>
      <div class="result-title" id="res-title"></div>
      <div class="result-desc" id="res-desc"></div>
      <button class="btn" onclick="restartQuiz()">再 测 一 次</button>
      <div class="share-hint">截图发群里，看看谁最像 👀</div>
    </div>
  </div>

</div>

<script>
// ==================== QUESTION DATA ====================
const questions = [
  {
    text: "你游玩osu!mania是一个偏向于准度的玩家吗",
    options: [
      { text: "是，打准好玩", score: 2 },
      { text: "不是，打极限才能更好装逼", score: 0 },
      { text: "准度与极限兼修", score: 0 }
    ]
  },
  {
    text: "游玩osu!mania耐力要求很高的谱面时，你会暂停吗",
    options: [
      { text: "会，但暂的不多", score: 2 },
      { text: "我是耐力大王，我才不暂停", score: 0 },
      { text: "暂停20次", score: 1 }
    ]
  },
  {
    text: "评价木桶饭的时候应该怎么管理面部表情？",
    options: [
      { text: "眉飞色舞，高谈阔论 直言不讳的讨论木桶饭后门云云", score: 1 },
      { text: "表现平淡，文静内敛 耐心旁听他人如何看待", score: 0 },
      { text: "想操...............", score: 2 }
    ]
  },
  {
    text: "与网友面基，你的父亲提议与你一起去，你会怎么做",
    options: [
      { text: "还是算了吧，面基怎么能带着家里人一块去", score: 0 },
      { text: "去倒是可以，但在聊天时间不能打扰我们", score: 1 },
      { text: "那咋不去啊，刚好让我爹跟别人交个朋友以后好照顾", score: 2 }
    ]
  },
  {
    text: "你在网上因为一些原因与网友起了矛盾，你会怎么办",
    options: [
      { text: "多思考一下原因，也有可能是自己问题，实在不行到时候说一下互相道个歉", score: 0 },
      { text: "起矛盾就起矛盾了，反正是网上的人也见不到了，不理他了", score: 1 },
      { text: "在背后蛐蛐ta，将ta说成十恶不赦的人", score: 2 }
    ]
  },
  {
    text: "聊的很熟的网友某天邀请你来面基，你要怎么做",
    options: [
      { text: "别人爽约我当然要接受", score: 0 },
      { text: "无法确定时间是否充裕，还是算了吧", score: 0 },
      { text: "答应别人，不过如果出了什么其他事会直接一声不说当场跑路", score: 2 }
    ]
  },
  {
    text: "看到和自己有矛盾的人在社区取得了成就你的反应是",
    options: [
      { text: "有过矛盾当作无视就行了，反正跟自己没关系", score: 0 },
      { text: "自己内心嫉妒，瞧不起ta", score: 1 },
      { text: "在背后蛐蛐ta，说ta根本没那个本事", score: 2 }
    ]
  },
  {
    text: "打gbc被金戈铁马ban了，你的做法是",
    options: [
      { text: "I won't play Chinese 4k tournaments anymore", score: 2 },
      { text: "或者的确是自己问题，好好反思一下吧", score: 0 },
      { text: "不解释，也不做出任何回应", score: 1 }
    ]
  },
  {
    text: "朋友跟你AA吃饭，你应该",
    options: [
      { text: "给钱抹个零吧，应该不会介意的", score: 0 },
      { text: "都哥们，凑个整吧", score: 0 },
      { text: "故意少给", score: 2 }
    ]
  },
  {
    text: "在漫展看到好看的coser 你会选择",
    options: [
      { text: "单膝下跪一手捧花", score: 2 },
      { text: "老师可以集邮吗", score: 0 },
      { text: "老师你好美我是你的狗*下跪*", score: 1 }
    ]
  },
  {
    text: "当你和一个人意见不和时 你选择",
    options: [
      { text: "当面撕逼", score: 1 },
      { text: "小团体蛐蛐并访问空间", score: 2 },
      { text: "置之不理", score: 0 }
    ]
  },
  {
    text: "在大群里聊天时有人提到了非洲你会",
    options: [
      { text: "顺着ta聊下去", score: 0 },
      { text: "阳光彩虹小白马，非洲不都是内阁吗？", score: 2 },
      { text: "我就笑笑不说话", score: 0 }
    ]
  },
  {
    text: "被偷拍做成表情包，你会",
    options: [
      { text: "找个仇人挂到毫不相干的别的事件的动态下面", score: 2 },
      { text: "那咋办，受着呗", score: 0 },
      { text: "联系偷拍的人尝试沟通", score: 0 }
    ]
  },
  {
    text: "你对拍照部位的喜好是",
    options: [
      { text: "全身", score: 0 },
      { text: "肚子", score: 1 },
      { text: "脚", score: 1 }
    ]
  },
  {
    text: "你外出时的鞋子选择",
    options: [
      { text: "运动鞋", score: 0 },
      { text: "凉鞋", score: 2 },
      { text: "板鞋", score: 1 }
    ]
  },
  {
    text: "如果你在一个音游群发现一个说话方式很像女生的人，但最后得知他是个男的，你会怎么做",
    options: [
      { text: "男的啊，原来是哥们，误会了", score: 0 },
      { text: "下头男还装女的马上跟别人说他勾引我", score: 2 },
      { text: "小男娘，更喜欢了", score: 0 }
    ]
  },
  {
    text: "下列人体部位你最喜欢的是什么",
    options: [
      { text: "屁股", score: 2 },
      { text: "脸", score: 0 },
      { text: "腿", score: 0 }
    ]
  }
];

// ==================== STATE ====================
const MAX_SCORE = 33;
let shuffled = [];
let currentIdx = 0;
let totalScore = 0;
let answered = false;

// ==================== SHUFFLE ====================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ==================== SCREENS ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ==================== START ====================
function startQuiz() {
  shuffled = shuffle(questions.map((q, i) => ({ ...q, _orig: i })));
  currentIdx = 0;
  totalScore = 0;
  showScreen('quiz');
  renderQuestion();
}

// ==================== RENDER QUESTION ====================
function renderQuestion() {
  answered = false;
  const q = shuffled[currentIdx];
  const total = shuffled.length;
  const pct = Math.round((currentIdx / total) * 100);

  document.getElementById('prog-label').textContent = '第 ' + (currentIdx + 1) + ' / ' + total + ' 题';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent = 'Q' + (currentIdx + 1);
  document.getElementById('q-text').textContent = q.text;

  const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
  const optsContainer = document.getElementById('q-options');
  optsContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = '<span class="opt-label">' + labels[i] + '</span><span class="opt-label-inner">' + opt.text + '</span>';
    btn.addEventListener('click', () => selectAnswer(opt.score));
    optsContainer.appendChild(btn);
  });
}

// ==================== SELECT ANSWER ====================
function selectAnswer(score) {
  if (answered) return;
  answered = true;
  totalScore += score;
  currentIdx++;

  if (currentIdx >= shuffled.length) {
    showResult();
  } else {
    setTimeout(renderQuestion, 200);
  }
}

// ==================== RESULT ====================
function showResult() {
  const pct = Math.round((totalScore / MAX_SCORE) * 100);

  let emoji, title, desc;
  if (pct <= 15) {
    emoji = '🎉'; title = '恭喜你，你是纯良萌萌人！';
  } else if (pct <= 35) {
    emoji = '😲'; title = '你有点像高健。。。';
  } else if (pct <= 55) {
    emoji = '😆'; title = '你真是高健吗？';
  } else if (pct <= 75) {
    emoji = '🤣'; title = '你非常高健了，，，';
  } else if (pct <= 95) {
    emoji = '😂'; title = '你简直就是高健本人！';
  } else {
    emoji = '💀'; title = '你果然是跟他们一伙的。。。';
  }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-desc').textContent = desc;
  showScreen('result');
}

function restartQuiz() {
  showScreen('start');
}

// ==================== CLICK EFFECT ====================
const clickImgs = ['click.png', 'click2.jpg'];

document.addEventListener('click', function(e) {
  const img = document.createElement('img');
  img.src = clickImgs[Math.floor(Math.random() * clickImgs.length)];
  img.className = 'click-fx';
  img.style.left = e.clientX + 'px';
  img.style.top = e.clientY + 'px';
  // Random slight variation
  const size = 40 + Math.random() * 40;
  img.style.width = size + 'px';
  img.style.height = size + 'px';
  img.style.transform = 'translate(-50%, -50%) scale(0.5) rotate(' + (Math.random() * 30 - 15) + 'deg)';
  document.body.appendChild(img);
  // Force reflow then animate
  img.getBoundingClientRect();
  img.style.animation = 'clickPop 0.7s ease-out forwards';
  img.addEventListener('animationend', () => img.remove());
});
</script>

</body>
</html>
